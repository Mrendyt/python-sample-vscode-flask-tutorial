trigger:
- main

pool:
  name: 'testing_pool' # Correct pool name

steps:
# Bypasses the download attempt and uses your local Python 3.12
- script: |
    python --version
    python -m pip --version
  displayName: 'Verify Local Python 3.12'

- script: |
    python -m pip install --upgrade pip
    # pip install -r requirements.txt
  displayName: 'Install dependencies'

- script: |
    python -m pip install pytest pytest-azurepipelines
    # pytest
  displayName: 'pytest'
